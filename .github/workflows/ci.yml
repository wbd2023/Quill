name: CI

on:
  pull_request:
  push:
    branches:
      - main

    tags:
      - "v*"
permissions:
  contents: read

jobs:
  verify:
    name: Build, Test, And Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Verify module
        run: go mod verify

      - name: Install pinned style tools
        run: make style-install

      - name: Run strict style gate
        run: make lint

      - name: Run Go tests
        run: make test

      - name: Run go vet
        run: go vet ./...

      - name: Build Quill with VCS metadata
        run: GOFLAGS=-buildvcs=true make build

      - name: Verify tagged version
        if: startsWith(github.ref, 'refs/tags/')
        run: test "$(./bin/quill version)" = "$GITHUB_REF_NAME"
