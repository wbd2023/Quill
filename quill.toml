[[rules]]
id = "go/process"
enforcement = "required"
scope = "all"
requirement_ids = ["2.5.no-shell-interpolation"]

[[rules]]
id = "go/resources"
enforcement = "required"
scope = "all"
requirement_ids = [
  "3.2.no-context-on-structs",
  "3.2.explicit-network-timeouts",
  "3.2.justify-ignored-close-errors",
]

[[rules]]
id = "go/returns"
enforcement = "required"
scope = "all"
requirement_ids = [
  "3.4.named-return-values",
  "3.4.named-returns-in-all-signatures",
  "3.4.no-placeholder-return-names",
  "3.4.no-naked-returns",
  "3.4.explicit-return-values",
  "3.4.naked-return-void-only",
