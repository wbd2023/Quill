[[rules]]
id = "profile/quality-commands"
enforcement = "required"
scope = "all"
requirement_ids = [
  "0.5.make-lint",
  "0.5.make-lint-required",
  "0.5.make-lint-fix",
  "0.5.make-style-install",
  "0.5.make-style-doctor",
