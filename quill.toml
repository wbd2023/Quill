[[rules]]
id = "go/security"
enforcement = "required"
scope = "all"
requirement_ids = [
  "2.3.no-secrets-in-repo",
  "2.4.crypto-rand",
  "2.4.no-deprecated-crypto",
]

[[rules]]
id = "go/switch-case-spacing"
enforcement = "recommendation"
scope = "all"
