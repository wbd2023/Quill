[[rules]]
id = "go/parameters"
enforcement = "required"
scope = "all"
requirement_ids = [
  "3.4.no-type-elision",
  "3.4.explicit-parameter-types",
  "3.7.ctx-first",
  "3.7.secrets-last",
  "3.5.constructor-category-order",
