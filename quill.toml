[[rules]]
id = "go/tests"
enforcement = "required"
scope = "all"
requirement_ids = [
  "6.1.helpers-call-helper",
  "6.1.helpers-after-tests",
  "6.1.use-tempdir",
  "6.1.use-setenv",
  "6.1.avoid-arbitrary-sleeps",
]

[[rules]]
id = "markdown/style"
enforcement = "required"
scope = "all"
requirement_ids = ["5.2.use-markdown", "5.2.keep-go-docs-readable"]

[[rules]]
id = "profile/enforcement-levels"
enforcement = "required"
scope = "all"
requirement_ids = [
  "0.5.required-fails-ci",
  "0.5.recommendations-report-only",
  "0.5.experimental-opt-in",
]

[[rules]]
id = "profile/excluded-directories"
enforcement = "required"
scope = "all"
requirement_ids = [
  "0.2.exclude-vendor",
  "0.2.exclude-third-party",
  "0.2.exclude-testdata",
  "0.2.exclude-generated",
  "1.2.generated-exception",
  "1.2.vendor-exception",
