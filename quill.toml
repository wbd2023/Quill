schema_version = 1

[repository]
root_markers = ["STYLE.md", "quill.toml"]
default_scope = "all"
excluded_directories = [
  ".cache",
  ".git",
  ".toolchain",
  "bin",
  "testdata",
  "third_party",
  "vendor",
]
generated_marker = "DO NOT EDIT."

[repository.scope_roots]
all = ["."]

[style_guide]
path = "STYLE.md"

[path_roles]
go_source = ["cmd/", "internal/"]

[file_sets.markdown.include]
extensions = [".md"]
files = { all = [
  "README.md",
  "STYLE.md",
  "CONTRIBUTING.md",
  "SECURITY.md",
  "TODO.md",
  "CLA.md",
  "CONTEXT.md",
  "CONTRIBUTOR_PRIVACY.md",
] }
paths = { all = ["cmd/", "docs/", "internal/"] }

[file_sets.line_length.exclude]
files = ["go.sum"]

[file_sets.spelling.exclude]
extensions = [".go"]
files = [
  "CLA.md",
  "COPYING",
  "COPYING.*",
  "LICENSE",
  "LICENSE.*",
  "NOTICE",
  "NOTICE.*",
]

[targets.go]
language = "go"
scope = "all"
working_directory = "."
format_paths = ["cmd", "internal"]
check_paths = ["cmd", "internal"]

[tools.go]
version = "1.24.5"

[tools.goimports]
version = "v0.42.0"

[tools.misspell]
version = "v0.3.4"

[tools."golangci-lint"]
version = "v2.6.2"

[tools.markdownlint]
version = "0.45.0"

[tools.shfmt]
version = "v3.12.0"

[tools.shellcheck]
version = "0.10.0"

[packs]
enabled = [
  "project",
  "text",
  "markdown",
  "bash",
  "go",
  "security",
  "vocabulary",
]

[packs.project.commands]
runner = "make"
path = "Makefile"

[[packs.project.commands.required_variables]]
name = "LINT_REQUIRED_ARGS"
value = "--mode required"

[[packs.project.commands.required_variables]]
name = "LINT_FULL_ARGS"
value = "--mode all --strict-recommendations --verbose"

[[packs.project.commands.required_targets]]
name = "lint"
recipe_line = "@$(QUILL_CMD) check $(LINT_FULL_ARGS)"

[[packs.project.commands.required_targets]]
name = "lint-required"
recipe_line = "@$(QUILL_CMD) check $(LINT_REQUIRED_ARGS)"

[[packs.project.commands.required_targets]]
name = "lint-fix"
recipe_line = "@$(QUILL_CMD) fix --scope all"

[[packs.project.commands.required_targets]]
name = "style-install"
recipe_line = "@$(QUILL_CMD) install"

[[packs.project.commands.required_targets]]
name = "style-doctor"
recipe_line = "@$(QUILL_CMD) doctor"

[[packs.project.commands.required_targets]]
name = "style-coverage"
recipe_line = "@$(QUILL_CMD) coverage"

[packs.text.section_headers]
large_min_lines = 100
short_max_lines = 79
max_header_count = 6
generic_names = ["Check", "Checks", "Misc", "Other"]
structural_names = [
  "Accessors",
  "Compile",
  "Constants",
  "Errors",
  "Helpers",
  "Loading",
  "Lookups",
  "Registry",
  "Rendering",
  "Sync",
  "Tools",
  "Types",
  "Validation",
]

[packs.go]
local_import_prefixes = ["github.com/wbd2023/Quill"]

[packs.go.parameters]
secret_names = [
  "passphrase",
  "privateKey",
  "token",
  "seed",
  "secret",
  "password",
  "secretKey",
]

[[packs.go.constructors.parameter_order]]
name = "repository"
type_name_suffixes = ["Repository"]

[[packs.go.constructors.parameter_order]]
name = "service"
type_name_suffixes = ["Service"]

[[packs.go.constructors.parameter_order]]
name = "adapter"
type_name_suffixes = ["Client", "Factory"]

[[packs.go.constructors.parameter_order]]
name = "config"
parameter_names = ["config", "options", "repositoryRoot"]

[[packs.go.constructors.parameter_order]]
name = "secret"
matches_secret_names = true

[[packs.go.architecture.layers]]
name = "quill"
package_roots = ["cmd", "internal"]
may_import = ["quill"]

[packs.vocabulary.go.type_suffixes]
Repository = ["Store"]

[packs.vocabulary.go.identifier_suffixes]
Repository = ["Repo"]
Service = ["Svc"]
Config = ["Cfg"]
Manager = ["Mgr"]

[packs.vocabulary.bash.variable_names]
COLOUR_RESET = ["NC"]


[[rules]]
id = "bash/magic-values"
enforcement = "recommendation"
scope = "all"
requirement_ids = ["1.6.bash-magic-values-recommendation"]

[[rules]]
id = "bash/safety"
enforcement = "required"
scope = "all"
requirement_ids = [
  "4.1.lowercase-shell-functions",
  "4.1.uppercase-shell-constants",
  "4.1.main-at-bottom",
  "4.2.detect-tools-with-command-v",
  "4.2.use-mktemp",
  "4.2.trap-temp-cleanup",
  "4.2.avoid-state-losing-read-loops",
  "4.2.local-shellcheck-suppressions",
]

[[rules]]
id = "bash/shellcheck"
enforcement = "required"
scope = "all"
requirement_ids = [
  "4.2.command-substitution",
  "4.2.prefer-double-brackets",
  "4.2.quote-expansions",
  "4.2.use-read-r",
  "4.2.avoid-eval",
]

[[rules]]
id = "bash/shfmt"
enforcement = "required"
scope = "all"
requirement_ids = ["4.1.tabs-not-spaces", "4.1.no-trailing-whitespace"]

[[rules]]
id = "bash/structure"
enforcement = "required"
scope = "all"
requirement_ids = [
  "4.1.shebang",
  "4.1.strict-mode",
  "4.1.tabs-not-spaces",
  "4.1.no-trailing-whitespace",
  "4.1.unix-line-endings",
]

[[rules]]
id = "bash/test-hygiene"
enforcement = "required"
scope = "all"
requirement_ids = ["6.2.cleanup-temp-resources"]

[[rules]]
id = "go/comments"
enforcement = "required"
scope = "all"
requirement_ids = [
  "3.8.inline-comments-lowercase",
  "3.8.inline-comments-no-period",
]

[[rules]]
id = "go/data"
enforcement = "required"
scope = "all"
requirement_ids = [
  "3.10.named-struct-literals",
  "3.10.use-len-for-slice-emptiness",
  "3.10.no-pointers-to-interfaces",
  "3.10.pass-interface-values-directly",
]

[[rules]]
id = "go/errors"
enforcement = "required"
scope = "all"
requirement_ids = [
  "3.1.adapters-wrap-with-cause",
  "3.1.error-context-lowercase",
  "3.1.error-context-no-punctuation",
  "3.1.error-context-no-secrets",
]

[[rules]]
id = "go/guard-clause-spacing"
enforcement = "recommendation"
scope = "all"
requirement_ids = ["1.8.blank-line-between-guards"]

[[rules]]
id = "go/lint"
enforcement = "required"
scope = "all"
requirement_ids = [
  "1.3.configured-spelling-wins",
  "1.6.no-unexplained-numbers",
  "3.2.cancel-func-called",
  "3.2.close-closers",
  "3.2.rebind-loop-variables",
  "3.4.no-naked-returns",
  "3.8.doc-comments-start-name",
  "3.8.doc-comments-full-sentences",
  "3.6.use-gofmt",
  "3.6.use-goimports",
  "3.6.import-group-order",
  "3.6.no-blank-imports",
]

[[rules]]
id = "go/logging"
enforcement = "required"
scope = "all"
requirement_ids = [
  "2.2.structured-logs",
  "2.2.stable-log-keys",
  "2.2.no-secrets-in-logs",
]

[[rules]]
id = "go/naming"
enforcement = "required"
scope = "all"
requirement_ids = ["3.3.limit-single-letter-names"]

[[rules]]
id = "go/order"
enforcement = "required"
scope = "all"
requirement_ids = [
