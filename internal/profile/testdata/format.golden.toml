schema_version = 1

[repository]
root_markers = ["PROJECT.marker"]
default_scope = "app"
excluded_directories = []
generated_marker = "Code generated by"

[repository.scope_roots]
app = ["."]

[style_guide]
path = "STYLE.md"

[packs]
enabled = ["project", "text"]

[packs.project.commands]
path = "Makefile"
runner = "make"

[[packs.project.commands.required_targets]]
name = "lint"
recipe_line = "go test ./..."

[packs.text.section_headers]
generic_names = ["Misc"]
large_min_lines = 100
max_header_count = 6
short_max_lines = 79
structural_names = []

[[rules]]
id = "text/test"
enforcement = "required"
scope = "app"
requirement_ids = ["1.1.test-rule"]
